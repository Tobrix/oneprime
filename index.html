<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnePrime TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100dvh;background:#06070d;overflow:hidden;font-family:'Inter',sans-serif}
    body{display:flex;align-items:center;justify-content:center}

    /* ── INTRO ── */
    #stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}

    .logo{display:flex;flex-direction:column;align-items:center;gap:20px;animation:up .9s cubic-bezier(.22,1,.36,1) both}
    @keyframes up{from{opacity:0;transform:scale(.72) translateY(28px)}to{opacity:1;transform:scale(1) translateY(0)}}

    .logo svg{filter:drop-shadow(0 0 44px rgba(99,102,241,.6))}

    .name{
      font-family:'Syne',sans-serif;
      font-size:clamp(2.4rem,7vw,4rem);
      font-weight:800;letter-spacing:-.035em;
      color:#fff;text-shadow:0 0 80px rgba(99,102,241,.4);
    }
    .name b{color:#818cf8;font-weight:800}

    .tag{
      font-size:clamp(.7rem,1.6vw,.82rem);
      color:rgba(255,255,255,.28);letter-spacing:.24em;
      text-transform:uppercase;font-weight:400;margin-top:2px;
      animation:up .9s .18s cubic-bezier(.22,1,.36,1) both;
    }

    /* Progress */
    .bar-wrap{
      margin-top:56px;width:140px;height:2px;
      background:rgba(255,255,255,.07);border-radius:1px;overflow:hidden;
      animation:up .8s .32s both;
    }
    .bar{
      height:100%;width:0%;border-radius:1px;
      background:linear-gradient(90deg,#6366f1,#8b5cf6,#a78bfa);
      transition:width 2.6s cubic-bezier(.4,0,.2,1);
    }

    /* Tagline below bar */
    .sub{
      margin-top:20px;font-size:.72rem;
      color:rgba(255,255,255,.16);letter-spacing:.12em;
      text-transform:uppercase;font-weight:300;
      animation:up .8s .5s both;
    }

    /* Fade out */
    #stage.out{animation:fade-out .65s ease forwards}
    @keyframes fade-out{to{opacity:0;pointer-events:none}}

    /* ── PARTICLES (subtle) ── */
    canvas#particles{position:fixed;inset:0;pointer-events:none;opacity:.35}
  </style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="stage">
  <div class="logo">
    <svg width="96" height="96" viewBox="0 0 100 100" fill="none">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
          <stop stop-color="#4f46e5"/><stop offset="1" stop-color="#7c3aed"/>
        </linearGradient>
        <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
          <stop stop-color="rgba(255,255,255,.2)"/><stop offset="1" stop-color="transparent"/>
        </linearGradient>
      </defs>
      <rect width="100" height="100" rx="24" fill="url(#g1)"/>
      <rect width="100" height="50" rx="24" fill="url(#g2)" opacity=".4"/>
      <rect x="18" y="30" width="64" height="40" rx="6" fill="white" opacity=".95"/>
      <circle cx="50" cy="50" r="12" fill="#4f46e5"/>
      <polygon points="46,44 46,56 59,50" fill="white"/>
    </svg>
    <div class="name">OnePrime<b>TV</b></div>
    <div class="tag">Vaše televizní platforma</div>
  </div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="sub" id="sub">Načítám&hellip;</div>
</div>

<script>
// ── PARTICLES ──────────────────────────────────────────────
const cvs = document.getElementById('particles');
const ctx = cvs.getContext('2d');
let W, H, dots = [];
function resize() {
  W = cvs.width  = window.innerWidth;
  H = cvs.height = window.innerHeight;
}
resize(); window.addEventListener('resize', resize);
for (let i=0; i<55; i++) {
  dots.push({
    x: Math.random()*1600-100, y: Math.random()*900-100,
    vx:(Math.random()-.5)*.22, vy:(Math.random()-.5)*.22,
    r: Math.random()*1.8+.5,
    a: Math.random()*.5+.15,
    hue: 240 + Math.random()*40,
  });
}
function frame() {
  requestAnimationFrame(frame);
  ctx.clearRect(0,0,W,H);
  dots.forEach(d => {
    d.x+=d.vx; d.y+=d.vy;
    if(d.x<-20) d.x=W+20; if(d.x>W+20) d.x=-20;
    if(d.y<-20) d.y=H+20; if(d.y>H+20) d.y=-20;
    ctx.beginPath();
    ctx.arc(d.x*W/1600,d.y*H/900,d.r,0,Math.PI*2);
    ctx.fillStyle=`hsla(${d.hue},80%,72%,${d.a})`;
    ctx.fill();
  });
}
frame();

// ── LOADING MESSAGES ───────────────────────────────────────
const msgs = ['Načítám programový průvodce…','Připravuji kanály…','Téměř hotovo…','Vítejte!'];
const subEl = document.getElementById('sub');
let mi = 0;
function nextMsg() {
  subEl.style.opacity='0';
  setTimeout(()=>{subEl.textContent=msgs[mi++%msgs.length];subEl.style.opacity='1';},300);
}
subEl.style.transition='opacity .3s';
setTimeout(nextMsg, 900);
setTimeout(nextMsg, 1800);
setTimeout(nextMsg, 2700);

// ── START ──────────────────────────────────────────────────
setTimeout(() => document.getElementById('bar').style.width='100%', 60);

setTimeout(() => {
  document.getElementById('stage').classList.add('out');
  setTimeout(() => location.href='oneprime.html', 660);
}, 3400);
</script>
</body>
</html>
